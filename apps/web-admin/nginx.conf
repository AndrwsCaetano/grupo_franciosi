server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Compressão básica
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 256;

  # Cache longo para assets versionados pelo webpack (bundle.js, style.css, imagens).
  location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri =404;
  }

  # Proxy reverso para a API. Caminhos espelham o `proxy` do webpack-dev-server.
  location ~ ^/(health|auth|users|profiles|permissions|data-sources|dashboards|vehicles|drivers|driver-auth|driver|fuelings|uploads)(/.*)?$ {
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    # Aumenta o limite para upload de comprovantes (5MB padrão na API).
    client_max_body_size 16m;
  }

  # SPA fallback — qualquer rota não encontrada cai no index.html (mas as
  # páginas do painel são .html separadas, então só vale como fallback geral).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
