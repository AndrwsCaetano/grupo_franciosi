<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Maquinário | Grupo Franciosi</title>
  </head>
  <body
    x-data="{ page: 'fuel-machinery', pageName: 'Maquinário', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <include src="./partials/preloader.html"></include>

    <div class="flex h-screen overflow-hidden">
      <include src="./partials/sidebar.html"></include>

      <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto">
        <include src="./partials/overlay.html" />
        <include src="./partials/header.html" />

        <main>
          <div class="p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6" x-data="fuelMachineryPage()" x-init="init()">
            <include src="./partials/breadcrumb.html" />

            <div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]">
              <div class="flex flex-col gap-3 mb-4 md:flex-row md:items-center md:justify-between">
                <div class="flex items-center gap-2">
                  <input
                    type="text"
                    x-model.debounce.300ms="q"
                    @input="load()"
                    placeholder="Pesquisar por tag ou nome…"
                    class="dark:bg-dark-900 h-11 w-full md:w-80 rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90"
                  />
                  <button type="button" @click="load()" class="inline-flex h-11 items-center rounded-lg border border-gray-200 px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]">
                    Atualizar
                  </button>
                </div>
                <button type="button" x-show="canWrite" @click="openNew()" class="inline-flex h-11 items-center justify-center rounded-lg bg-brand-500 px-5 text-sm font-medium text-white shadow-theme-xs hover:bg-brand-600">
                  + Novo maquinário
                </button>
              </div>

              <div x-show="error" x-cloak class="mb-3 rounded-lg border border-error-500/40 bg-error-500/10 px-4 py-3 text-sm text-error-700 dark:text-error-400" x-text="error"></div>

              <div class="overflow-x-auto">
                <table class="min-w-full text-left text-sm">
                  <thead class="border-b border-gray-200 text-xs uppercase text-gray-500 dark:border-gray-800 dark:text-gray-400">
                    <tr>
                      <th class="cursor-pointer px-4 py-3" @click="sortBy('tag')">Tag <span x-text="sortIndicator('tag')"></span></th>
                      <th class="cursor-pointer px-4 py-3" @click="sortBy('name')">Nome <span x-text="sortIndicator('name')"></span></th>
                      <th class="cursor-pointer px-4 py-3" @click="sortBy('category')">Categoria <span x-text="sortIndicator('category')"></span></th>
                      <th class="px-4 py-3">Combustível padrão</th>
                      <th class="cursor-pointer px-4 py-3 text-right" @click="sortBy('hourMeter')">Horímetro <span x-text="sortIndicator('hourMeter')"></span></th>
                      <th class="cursor-pointer px-4 py-3 text-right" @click="sortBy('odometerKm')">Km <span x-text="sortIndicator('odometerKm')"></span></th>
                      <th class="px-4 py-3">Status</th>
                      <th class="px-4 py-3">Validação</th>
                      <th class="px-4 py-3 text-right">Ações</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-gray-100 dark:divide-gray-800">
                    <template x-if="loading">
                      <tr><td colspan="9" class="px-4 py-6 text-center text-gray-500">Carregando…</td></tr>
                    </template>
                    <template x-if="!loading && items.length === 0">
                      <tr><td colspan="9" class="px-4 py-6 text-center text-gray-500">Nenhum maquinário encontrado.</td></tr>
                    </template>
                    <template x-for="m in items" :key="m.id">
                      <tr class="hover:bg-gray-50 dark:hover:bg-white/[0.03]">
                        <td class="px-4 py-3 font-medium text-gray-800 dark:text-white/90" x-text="m.tag"></td>
                        <td class="px-4 py-3 text-gray-700 dark:text-gray-300" x-text="m.name"></td>
                        <td class="px-4 py-3 text-gray-700 dark:text-gray-300" x-text="m.category"></td>
                        <td class="px-4 py-3 text-gray-700 dark:text-gray-300" x-text="m.defaultProduct?.name || '—'"></td>
                        <td class="px-4 py-3 text-right text-gray-700 dark:text-gray-300" x-text="formatNumber(m.hourMeter)"></td>
                        <td class="px-4 py-3 text-right text-gray-700 dark:text-gray-300" x-text="formatNumber(m.odometerKm)"></td>
                        <td class="px-4 py-3">
                          <span :class="m.status === 'ATIVO' ? 'bg-success-50 text-success-600 dark:bg-success-500/15 dark:text-success-400' : 'bg-gray-100 text-gray-600 dark:bg-gray-800 dark:text-gray-300'" class="inline-flex rounded-full px-2 py-0.5 text-xs" x-text="statusLabel(m.status)"></span>
                        </td>
                        <td class="px-4 py-3">
                          <span :class="m.validatedAt ? 'bg-success-50 text-success-600 dark:bg-success-500/15 dark:text-success-400' : 'bg-warning-50 text-warning-600 dark:bg-warning-500/15 dark:text-warning-400'" class="inline-flex rounded-full px-2 py-0.5 text-xs">
                            <span x-text="m.validatedAt ? 'Validado' : 'Pendente'"></span>
                          </span>
                        </td>
                        <td class="px-4 py-3 text-right whitespace-nowrap">
                          <button type="button" x-show="canValidate" @click="toggleValidate(m)" class="mr-2 rounded-md border border-gray-200 px-3 py-1.5 text-xs font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]" x-text="m.validatedAt ? 'Invalidar' : 'Aprovar'"></button>
                          <button type="button" x-show="canWrite" @click="openEdit(m)" class="rounded-md border border-gray-200 px-3 py-1.5 text-xs font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]">Editar</button>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>

              <p class="mt-3 text-xs text-gray-500 dark:text-gray-400">Total: <span x-text="total"></span></p>
            </div>

            <!-- Modal: novo/editar -->
            <div x-show="showForm" x-cloak class="fixed inset-0 z-99999 flex items-center justify-center bg-gray-900/50 p-4" @keydown.escape.window="closeForm()">
              <div class="w-full max-w-2xl rounded-2xl bg-white p-6 dark:bg-gray-900" @click.outside="closeForm()">
                <div class="mb-4 flex items-center justify-between">
                  <h3 class="text-lg font-semibold text-gray-800 dark:text-white/90" x-text="form.id ? 'Editar maquinário' : 'Novo maquinário'"></h3>
                  <button type="button" @click="closeForm()" class="text-gray-500 hover:text-gray-700">×</button>
                </div>
                <form @submit.prevent="save()" class="space-y-4">
                  <div x-show="formError" x-cloak class="rounded-lg border border-error-500/40 bg-error-500/10 px-4 py-2 text-sm text-error-700 dark:text-error-400" x-text="formError"></div>
                  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
                    <div>
                      <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">Tag *</label>
                      <input type="text" x-model="form.tag" @input="form.tag = $event.target.value.toUpperCase()" required class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 text-sm uppercase text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90" />
                    </div>
                    <div>
                      <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">Nome *</label>
                      <input type="text" x-model="form.name" required class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90" />
                    </div>
                    <div>
                      <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">Categoria *</label>
                      <input type="text" x-model="form.category" placeholder="Trator, colheitadeira…" required class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90" />
                    </div>
                    <div>
                      <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">Combustível padrão</label>
                      <select x-model="form.defaultProductId" class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-3 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90">
                        <option value="">— nenhum —</option>
                        <template x-for="p in products" :key="p.id">
                          <option :value="p.id" x-text="p.name"></option>
                        </template>
                      </select>
                    </div>
                    <div>
                      <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">Horímetro</label>
                      <input type="number" min="0" step="0.01" x-model.number="form.hourMeter" class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90" />
                    </div>
                    <div>
                      <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">Km</label>
                      <input type="number" min="0" step="1" x-model.number="form.odometerKm" class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90" />
                    </div>
                    <div class="sm:col-span-2">
                      <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">Status *</label>
                      <select x-model="form.status" required class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-3 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90">
                        <option value="ATIVO">Ativo</option>
                        <option value="INATIVO">Inativo</option>
                        <option value="MANUTENCAO">Em manutenção</option>
                      </select>
                    </div>
                  </div>
                  <div class="flex justify-end gap-2 pt-2">
                    <button type="button" @click="closeForm()" class="h-11 rounded-lg border border-gray-200 px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]">Cancelar</button>
                    <button type="submit" :disabled="saving" class="h-11 rounded-lg bg-brand-500 px-5 text-sm font-medium text-white hover:bg-brand-600 disabled:opacity-70">
                      <span x-show="!saving">Guardar</span>
                      <span x-show="saving" x-cloak>A guardar…</span>
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
