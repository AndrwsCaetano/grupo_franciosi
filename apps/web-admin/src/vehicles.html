<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Veículos | Grupo Franciosi</title>
  </head>
  <body
    x-data="{ page: 'vehicles', pageName: 'Veículos', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <include src="./partials/preloader.html"></include>

    <div class="flex h-screen overflow-hidden">
      <include src="./partials/sidebar.html"></include>

      <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto">
        <include src="./partials/overlay.html" />
        <include src="./partials/header.html" />

        <main>
          <div class="p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6" x-data="vehiclesPage()" x-init="init()">
            <include src="./partials/breadcrumb.html" />

            <div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]">
              <div class="flex flex-col gap-3 mb-4 md:flex-row md:items-center md:justify-between">
                <div class="flex items-center gap-2">
                  <input
                    type="text"
                    x-model.debounce.300ms="q"
                    @input="load()"
                    placeholder="Pesquisar por placa, marca ou modelo…"
                    class="dark:bg-dark-900 h-11 w-full md:w-80 rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90"
                  />
                  <button
                    type="button"
                    @click="load()"
                    class="inline-flex h-11 items-center rounded-lg border border-gray-200 px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]"
                  >
                    Atualizar
                  </button>
                </div>
                <button
                  type="button"
                  x-show="canWrite"
                  @click="openNew()"
                  class="inline-flex h-11 items-center justify-center rounded-lg bg-brand-500 px-5 text-sm font-medium text-white shadow-theme-xs hover:bg-brand-600"
                >
                  + Novo veículo
                </button>
              </div>

              <div x-show="error" x-cloak class="mb-3 rounded-lg border border-error-500/40 bg-error-500/10 px-4 py-3 text-sm text-error-700 dark:text-error-400" x-text="error"></div>

              <div class="overflow-x-auto">
                <table class="min-w-full text-left text-sm">
                  <thead class="border-b border-gray-200 text-xs uppercase text-gray-500 dark:border-gray-800 dark:text-gray-400">
                    <tr>
                      <th class="cursor-pointer px-4 py-3" @click="sortBy('plate')">
                        Placa <span x-text="sortIndicator('plate')"></span>
                      </th>
                      <th class="cursor-pointer px-4 py-3" @click="sortBy('brand')">
                        Marca <span x-text="sortIndicator('brand')"></span>
                      </th>
                      <th class="cursor-pointer px-4 py-3" @click="sortBy('model')">
                        Modelo <span x-text="sortIndicator('model')"></span>
                      </th>
                      <th class="cursor-pointer px-4 py-3 text-right" @click="sortBy('fuelTankLiters')">
                        Tanque (L) <span x-text="sortIndicator('fuelTankLiters')"></span>
                      </th>
                      <th class="cursor-pointer px-4 py-3" @click="sortBy('active')">
                        Ativo <span x-text="sortIndicator('active')"></span>
                      </th>
                      <th class="px-4 py-3 text-right">Ações</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-gray-100 dark:divide-gray-800">
                    <template x-if="loading">
                      <tr>
                        <td colspan="6" class="px-4 py-6 text-center text-gray-500">Carregando…</td>
                      </tr>
                    </template>
                    <template x-if="!loading && items.length === 0">
                      <tr>
                        <td colspan="6" class="px-4 py-6 text-center text-gray-500">Nenhum veículo encontrado.</td>
                      </tr>
                    </template>
                    <template x-for="v in items" :key="v.id">
                      <tr class="hover:bg-gray-50 dark:hover:bg-white/[0.03]">
                        <td class="px-4 py-3 font-medium text-gray-800 dark:text-white/90" x-text="v.plate"></td>
                        <td class="px-4 py-3 text-gray-700 dark:text-gray-300" x-text="v.brand"></td>
                        <td class="px-4 py-3 text-gray-700 dark:text-gray-300" x-text="v.model"></td>
                        <td class="px-4 py-3 text-right text-gray-700 dark:text-gray-300" x-text="v.fuelTankLiters"></td>
                        <td class="px-4 py-3">
                          <span :class="v.active ? 'bg-success-50 text-success-600 dark:bg-success-500/15 dark:text-success-400' : 'bg-gray-100 text-gray-600 dark:bg-gray-800 dark:text-gray-300'" class="inline-flex rounded-full px-2 py-0.5 text-xs">
                            <span x-text="v.active ? 'Sim' : 'Não'"></span>
                          </span>
                        </td>
                        <td class="px-4 py-3 text-right">
                          <button
                            type="button"
                            x-show="canWrite"
                            @click="openEdit(v)"
                            class="mr-2 rounded-md border border-gray-200 px-3 py-1.5 text-xs font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]"
                          >Editar</button>
                          <button
                            type="button"
                            x-show="canWrite"
                            @click="askDelete(v)"
                            class="rounded-md border border-error-500/40 px-3 py-1.5 text-xs font-medium text-error-600 hover:bg-error-500/10"
                          >Excluir</button>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>

              <p class="mt-3 text-xs text-gray-500 dark:text-gray-400">
                Total: <span x-text="total"></span>
              </p>
            </div>

            <!-- Modal: novo/editar -->
            <div x-show="showForm" x-cloak class="fixed inset-0 z-99999 flex items-center justify-center bg-gray-900/50 p-4" @keydown.escape.window="closeForm()">
              <div class="w-full max-w-xl rounded-2xl bg-white p-6 dark:bg-gray-900" @click.outside="closeForm()">
                <div class="mb-4 flex items-center justify-between">
                  <h3 class="text-lg font-semibold text-gray-800 dark:text-white/90" x-text="form.id ? 'Editar veículo' : 'Novo veículo'"></h3>
                  <button type="button" @click="closeForm()" class="text-gray-500 hover:text-gray-700">×</button>
                </div>
                <form @submit.prevent="save()" class="space-y-4">
                  <div x-show="formError" x-cloak class="rounded-lg border border-error-500/40 bg-error-500/10 px-4 py-2 text-sm text-error-700 dark:text-error-400" x-text="formError"></div>
                  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
                    <div>
                      <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">Placa *</label>
                      <input type="text" maxlength="8" x-model="form.plate" @input="form.plate = $event.target.value.toUpperCase()" required class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90" placeholder="ABC1D23" />
                    </div>
                    <div>
                      <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">Tanque (litros) *</label>
                      <input type="number" min="0" max="9999" step="1" x-model.number="form.fuelTankLiters" required class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90" />
                    </div>
                    <div>
                      <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">Marca *</label>
                      <input type="text" x-model="form.brand" required class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90" />
                    </div>
                    <div>
                      <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">Modelo *</label>
                      <input type="text" x-model="form.model" required class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90" />
                    </div>
                    <div class="sm:col-span-2 flex items-center gap-2">
                      <input id="vehicle-active" type="checkbox" x-model="form.active" class="h-4 w-4" />
                      <label for="vehicle-active" class="text-sm text-gray-700 dark:text-gray-300">Ativo</label>
                    </div>
                  </div>
                  <div class="flex justify-end gap-2 pt-2">
                    <button type="button" @click="closeForm()" class="h-11 rounded-lg border border-gray-200 px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]">Cancelar</button>
                    <button type="submit" :disabled="saving" class="h-11 rounded-lg bg-brand-500 px-5 text-sm font-medium text-white hover:bg-brand-600 disabled:opacity-70">
                      <span x-show="!saving">Guardar</span>
                      <span x-show="saving" x-cloak>A guardar…</span>
                    </button>
                  </div>
                </form>
              </div>
            </div>

            <!-- Modal: confirmação de exclusão -->
            <div x-show="confirmId" x-cloak class="fixed inset-0 z-99999 flex items-center justify-center bg-gray-900/50 p-4">
              <div class="w-full max-w-md rounded-2xl bg-white p-6 dark:bg-gray-900">
                <h3 class="mb-2 text-lg font-semibold text-gray-800 dark:text-white/90">Confirmar exclusão</h3>
                <p class="mb-4 text-sm text-gray-600 dark:text-gray-400">
                  Excluir veículo <strong x-text="confirmPlate"></strong>?
                </p>
                <div class="flex justify-end gap-2">
                  <button type="button" @click="cancelDelete()" class="h-10 rounded-lg border border-gray-200 px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]">Cancelar</button>
                  <button type="button" @click="confirmDelete()" class="h-10 rounded-lg bg-error-500 px-5 text-sm font-medium text-white hover:bg-error-600">Excluir</button>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
