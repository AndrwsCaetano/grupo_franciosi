<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Perfis | Agrigestão</title>
  </head>
  <body
    x-data="{ page: 'profiles', pageName: 'Perfis de acesso', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <include src="./partials/preloader.html"></include>

    <div class="flex h-screen overflow-hidden">
      <include src="./partials/sidebar.html"></include>

      <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto">
        <include src="./partials/overlay.html" />
        <include src="./partials/header.html" />

        <main>
          <div class="p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6" x-data="profilesPage()" x-init="init()">
            <include src="./partials/breadcrumb.html" />

            <div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]">
              <div class="flex flex-col gap-3 mb-4 md:flex-row md:items-center md:justify-between">
                <div class="flex items-center gap-2">
                  <input
                    type="text"
                    x-model.debounce.200ms="q"
                    placeholder="Pesquisar por nome ou descrição…"
                    class="dark:bg-dark-900 h-11 w-full md:w-80 rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90"
                  />
                  <button type="button" @click="load()" class="inline-flex h-11 items-center rounded-lg border border-gray-200 px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]">
                    Atualizar
                  </button>
                </div>
                <button type="button" x-show="canWrite" @click="openNew()" class="inline-flex h-11 items-center justify-center rounded-lg bg-brand-500 px-5 text-sm font-medium text-white shadow-theme-xs hover:bg-brand-600">
                  + Novo perfil
                </button>
              </div>

              <div x-show="error" x-cloak class="mb-3 rounded-lg border border-error-500/40 bg-error-500/10 px-4 py-3 text-sm text-error-700 dark:text-error-400" x-text="error"></div>

              <div class="overflow-x-auto">
                <table class="min-w-full text-left text-sm">
                  <thead class="border-b border-gray-200 text-xs uppercase text-gray-500 dark:border-gray-800 dark:text-gray-400">
                    <tr>
                      <th class="cursor-pointer px-4 py-3" @click="sortBy('name')">Nome <span x-text="sortIndicator('name')"></span></th>
                      <th class="px-4 py-3">Descrição</th>
                      <th class="cursor-pointer px-4 py-3 text-right" @click="sortBy('users')">Usuários <span x-text="sortIndicator('users')"></span></th>
                      <th class="cursor-pointer px-4 py-3 text-right" @click="sortBy('permissions')">Liberações <span x-text="sortIndicator('permissions')"></span></th>
                      <th class="px-4 py-3 text-right">Ações</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-gray-100 dark:divide-gray-800">
                    <template x-if="loading">
                      <tr><td colspan="5" class="px-4 py-6 text-center text-gray-500">Carregando…</td></tr>
                    </template>
                    <template x-if="!loading && filteredItems().length === 0">
                      <tr><td colspan="5" class="px-4 py-6 text-center text-gray-500">Nenhum perfil encontrado.</td></tr>
                    </template>
                    <template x-for="p in filteredItems()" :key="p.id">
                      <tr class="hover:bg-gray-50 dark:hover:bg-white/[0.03]">
                        <td class="px-4 py-3 font-medium text-gray-800 dark:text-white/90" x-text="p.name"></td>
                        <td class="px-4 py-3 text-gray-700 dark:text-gray-300" x-text="p.description || '—'"></td>
                        <td class="px-4 py-3 text-right text-gray-700 dark:text-gray-300" x-text="p._count?.users ?? 0"></td>
                        <td class="px-4 py-3 text-right text-gray-700 dark:text-gray-300" x-text="grantedCount(p)"></td>
                        <td class="px-4 py-3 text-right">
                          <div class="inline-flex items-center gap-2">
                            <button type="button" x-show="canWrite" @click="openEdit(p)" class="rounded-md border border-gray-200 px-3 py-1.5 text-xs font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]">Editar</button>
                            <button type="button" x-show="canWrite" @click="askDelete(p)" class="rounded-md border border-error-500/30 px-3 py-1.5 text-xs font-medium text-error-600 hover:bg-error-500/10">Excluir</button>
                          </div>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </div>

            <!-- Modal Form -->
            <div x-show="showForm" x-cloak class="fixed inset-0 z-99999 flex items-center justify-center bg-black/40 px-4 py-8" @click.self="closeForm()">
              <div class="w-full max-w-3xl max-h-[90vh] overflow-y-auto rounded-2xl bg-white p-6 shadow-2xl dark:bg-gray-900">
                <div class="mb-4 flex items-center justify-between">
                  <h3 class="text-xl font-semibold text-gray-800 dark:text-white/90" x-text="form.id ? 'Editar perfil' : 'Novo perfil'"></h3>
                  <button type="button" @click="closeForm()" class="text-gray-500 hover:text-gray-800 dark:hover:text-white">✕</button>
                </div>

                <div x-show="formError" x-cloak class="mb-3 rounded-lg border border-error-500/40 bg-error-500/10 px-4 py-3 text-sm text-error-700 dark:text-error-400" x-text="formError"></div>

                <form @submit.prevent="save()" class="space-y-4">
                  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
                    <div>
                      <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">Nome *</label>
                      <input type="text" x-model="form.name" required maxlength="80" class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90" />
                    </div>
                    <div>
                      <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">Descrição</label>
                      <input type="text" x-model="form.description" maxlength="200" class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90" />
                    </div>
                  </div>

                  <div class="rounded-xl border border-gray-200 p-4 dark:border-gray-800">
                    <div class="mb-3 flex items-center justify-between">
                      <h4 class="text-sm font-semibold text-gray-800 dark:text-white/90">Liberações de menu / opções</h4>
                      <div class="flex items-center gap-2" x-show="canAssign">
                        <button type="button" @click="selectAllPermissions()" class="rounded-md border border-gray-200 px-2.5 py-1 text-xs text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]">Marcar todas</button>
                        <button type="button" @click="clearAllPermissions()" class="rounded-md border border-gray-200 px-2.5 py-1 text-xs text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]">Limpar</button>
                      </div>
                    </div>
                    <p class="mb-3 text-xs text-gray-500" x-show="!canAssign" x-cloak>
                      Você não possui permissão para alterar as liberações deste perfil.
                    </p>
                    <div class="grid grid-cols-1 gap-2 sm:grid-cols-2">
                      <template x-for="perm in permissionsCatalog" :key="perm.id">
                        <label class="flex items-start gap-2 rounded-lg border border-gray-100 p-2 hover:bg-gray-50 dark:border-gray-800 dark:hover:bg-white/[0.03]">
                          <input
                            type="checkbox"
                            :checked="!!form.permissions[perm.id]"
                            @change="togglePermission(perm.id)"
                            :disabled="!canAssign"
                            class="mt-1 h-4 w-4 rounded border-gray-300 text-brand-500 focus:ring-brand-500"
                          />
                          <span class="text-sm">
                            <span class="block font-medium text-gray-800 dark:text-white/90" x-text="perm.name"></span>
                            <span class="block text-xs text-gray-500" x-text="perm.code"></span>
                          </span>
                        </label>
                      </template>
                    </div>
                  </div>

                  <div class="flex justify-end gap-2 pt-2">
                    <button type="button" @click="closeForm()" class="h-11 rounded-lg border border-gray-200 px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]">Cancelar</button>
                    <button type="submit" :disabled="saving" class="h-11 rounded-lg bg-brand-500 px-5 text-sm font-medium text-white hover:bg-brand-600 disabled:opacity-70">
                      <span x-show="!saving">Guardar</span>
                      <span x-show="saving">Guardando…</span>
                    </button>
                  </div>
                </form>
              </div>
            </div>

            <!-- Confirm Delete -->
            <div x-show="confirmId" x-cloak class="fixed inset-0 z-99999 flex items-center justify-center bg-black/40 px-4" @click.self="cancelDelete()">
              <div class="w-full max-w-md rounded-2xl bg-white p-6 shadow-2xl dark:bg-gray-900">
                <h3 class="mb-2 text-lg font-semibold text-gray-800 dark:text-white/90">Excluir perfil</h3>
                <p class="mb-4 text-sm text-gray-700 dark:text-gray-300">
                  Tem a certeza que pretende excluir o perfil <strong x-text="confirmLabel"></strong>? Esta ação não pode ser desfeita.
                </p>
                <div class="flex justify-end gap-2">
                  <button type="button" @click="cancelDelete()" class="h-10 rounded-lg border border-gray-200 px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]">Cancelar</button>
                  <button type="button" @click="confirmDelete()" class="h-10 rounded-lg bg-error-500 px-4 text-sm font-medium text-white hover:bg-error-600">Excluir</button>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
