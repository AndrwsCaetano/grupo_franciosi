<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Produtos / Estoque | Grupo Franciosi</title>
  </head>
  <body
    x-data="{ page: 'fuel-products', pageName: 'Produtos / Estoque', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <include src="./partials/preloader.html"></include>

    <div class="flex h-screen overflow-hidden">
      <include src="./partials/sidebar.html"></include>

      <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto">
        <include src="./partials/overlay.html" />
        <include src="./partials/header.html" />

        <main>
          <div class="p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6" x-data="fuelProductsPage()" x-init="init()">
            <include src="./partials/breadcrumb.html" />

            <div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]">
              <div class="flex flex-col gap-3 mb-4 md:flex-row md:items-center md:justify-between">
                <div class="flex items-center gap-2">
                  <input
                    type="text"
                    x-model.debounce.300ms="q"
                    @input="load()"
                    placeholder="Pesquisar por nome…"
                    class="dark:bg-dark-900 h-11 w-full md:w-80 rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90"
                  />
                  <button type="button" @click="load()" class="inline-flex h-11 items-center rounded-lg border border-gray-200 px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]">
                    Atualizar
                  </button>
                </div>
                <button type="button" x-show="canWrite" @click="openNew()" class="inline-flex h-11 items-center justify-center rounded-lg bg-brand-500 px-5 text-sm font-medium text-white shadow-theme-xs hover:bg-brand-600">
                  + Novo produto
                </button>
              </div>

              <div x-show="error" x-cloak class="mb-3 rounded-lg border border-error-500/40 bg-error-500/10 px-4 py-3 text-sm text-error-700 dark:text-error-400" x-text="error"></div>

              <div class="overflow-x-auto">
                <table class="min-w-full text-left text-sm">
                  <thead class="border-b border-gray-200 text-xs uppercase text-gray-500 dark:border-gray-800 dark:text-gray-400">
                    <tr>
                      <th class="cursor-pointer px-4 py-3" @click="sortBy('name')">Nome <span x-text="sortIndicator('name')"></span></th>
                      <th class="cursor-pointer px-4 py-3" @click="sortBy('unit')">Unidade <span x-text="sortIndicator('unit')"></span></th>
                      <th class="cursor-pointer px-4 py-3" @click="sortBy('active')">Ativo <span x-text="sortIndicator('active')"></span></th>
                      <th class="px-4 py-3 text-right">Ações</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-gray-100 dark:divide-gray-800">
                    <template x-if="loading">
                      <tr><td colspan="4" class="px-4 py-6 text-center text-gray-500">Carregando…</td></tr>
                    </template>
                    <template x-if="!loading && items.length === 0">
                      <tr><td colspan="4" class="px-4 py-6 text-center text-gray-500">Nenhum produto encontrado.</td></tr>
                    </template>
                    <template x-for="pr in items" :key="pr.id">
                      <tr class="hover:bg-gray-50 dark:hover:bg-white/[0.03]">
                        <td class="px-4 py-3 font-medium text-gray-800 dark:text-white/90" x-text="pr.name"></td>
                        <td class="px-4 py-3 text-gray-700 dark:text-gray-300" x-text="pr.unit"></td>
                        <td class="px-4 py-3">
                          <span :class="pr.active ? 'bg-success-50 text-success-600 dark:bg-success-500/15 dark:text-success-400' : 'bg-gray-100 text-gray-600 dark:bg-gray-800 dark:text-gray-300'" class="inline-flex rounded-full px-2 py-0.5 text-xs">
                            <span x-text="pr.active ? 'Sim' : 'Não'"></span>
                          </span>
                        </td>
                        <td class="px-4 py-3 text-right">
                          <button type="button" @click="openEdit(pr)" class="rounded-md border border-gray-200 px-3 py-1.5 text-xs font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]">
                            <span x-show="canWrite">Editar</span>
                            <span x-show="!canWrite">Ver estoque</span>
                          </button>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>

              <p class="mt-3 text-xs text-gray-500 dark:text-gray-400">Total: <span x-text="total"></span></p>
            </div>

            <!-- Modal produto -->
            <div x-show="showForm" x-cloak class="fixed inset-0 z-99999 flex items-center justify-center bg-gray-900/50 p-4" @keydown.escape.window="closeForm()">
              <div class="w-full max-w-3xl rounded-2xl bg-white p-6 dark:bg-gray-900 max-h-[92vh] overflow-y-auto" @click.outside="closeForm()">
                <div class="mb-4 flex items-center justify-between">
                  <h3 class="text-lg font-semibold text-gray-800 dark:text-white/90" x-text="form.id ? 'Editar produto' : 'Novo produto'"></h3>
                  <button type="button" @click="closeForm()" class="text-gray-500 hover:text-gray-700">×</button>
                </div>

                <!-- Tabs -->
                <div class="mb-4 flex gap-2 border-b border-gray-200 dark:border-gray-800">
                  <button type="button" @click="formTab = 'data'" :class="formTab === 'data' ? 'border-brand-500 text-brand-600' : 'border-transparent text-gray-500'" class="border-b-2 px-3 pb-2 text-sm font-medium">Dados</button>
                  <button type="button" @click="formTab = 'stock'" :disabled="!form.id" :class="[formTab === 'stock' ? 'border-brand-500 text-brand-600' : 'border-transparent text-gray-500', !form.id ? 'opacity-50 cursor-not-allowed' : '']" class="border-b-2 px-3 pb-2 text-sm font-medium">
                    Estoque por ponto
                    <span x-show="!form.id" class="text-xs text-gray-400">(disponível após gravar)</span>
                  </button>
                </div>

                <!-- Aba Dados -->
                <div x-show="formTab === 'data'">
                  <form @submit.prevent="save()" class="space-y-4">
                    <div x-show="formError" x-cloak class="rounded-lg border border-error-500/40 bg-error-500/10 px-4 py-2 text-sm text-error-700 dark:text-error-400" x-text="formError"></div>
                    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
                      <div class="sm:col-span-2">
                        <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">Nome *</label>
                        <input type="text" x-model="form.name" :disabled="!canWrite" required class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 disabled:opacity-60" />
                      </div>
                      <div>
                        <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">Unidade *</label>
                        <select x-model="form.unit" :disabled="!canWrite" required class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-3 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 disabled:opacity-60">
                          <option value="L">Litro</option>
                          <option value="KG">Quilograma</option>
                          <option value="UN">Unidade</option>
                        </select>
                      </div>
                      <div class="flex items-center gap-2">
                        <input id="fuel-product-active" type="checkbox" x-model="form.active" :disabled="!canWrite" class="h-4 w-4" />
                        <label for="fuel-product-active" class="text-sm text-gray-700 dark:text-gray-300">Ativo</label>
                      </div>
                    </div>
                    <div class="flex justify-end gap-2 pt-2">
                      <button type="button" @click="closeForm()" class="h-11 rounded-lg border border-gray-200 px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]">Cancelar</button>
                      <button type="submit" x-show="canWrite" :disabled="saving" class="h-11 rounded-lg bg-brand-500 px-5 text-sm font-medium text-white hover:bg-brand-600 disabled:opacity-70">
                        <span x-show="!saving">Guardar</span>
                        <span x-show="saving" x-cloak>A guardar…</span>
                      </button>
                    </div>
                  </form>
                </div>

                <!-- Aba Estoque (somente leitura — a API não permite editar saldo direto;
                     ele é ajustado apenas por apontamentos, transferências e NFs de entrada). -->
                <div x-show="formTab === 'stock'" x-cloak>
                  <div x-show="stockError" x-cloak class="mb-3 rounded-lg border border-error-500/40 bg-error-500/10 px-4 py-2 text-sm text-error-700 dark:text-error-400" x-text="stockError"></div>
                  <p class="mb-3 text-xs text-gray-500 dark:text-gray-400">Saldo somente leitura. Ajustes ocorrem via apontamentos, transferências ou validação de NF de entrada (ERP).</p>

                  <div class="overflow-x-auto rounded-xl border border-gray-200 dark:border-gray-800">
                    <table class="min-w-full text-left text-sm">
                      <thead class="border-b border-gray-200 text-xs uppercase text-gray-500 dark:border-gray-800 dark:text-gray-400">
                        <tr>
                          <th class="px-3 py-2">Ponto</th>
                          <th class="px-3 py-2 text-right">Quantidade</th>
                          <th class="px-3 py-2 text-right">Reserva mínima</th>
                        </tr>
                      </thead>
                      <tbody class="divide-y divide-gray-100 dark:divide-gray-800">
                        <template x-if="loadingStock">
                          <tr><td colspan="3" class="px-3 py-4 text-center text-gray-500">Carregando…</td></tr>
                        </template>
                        <template x-if="!loadingStock && stockRows.length === 0">
                          <tr><td colspan="3" class="px-3 py-4 text-center text-gray-500">Sem pontos cadastrados.</td></tr>
                        </template>
                        <template x-for="row in stockRows" :key="row.pointId">
                          <tr>
                            <td class="px-3 py-2 font-medium" x-text="row.pointName"></td>
                            <td class="px-3 py-2 text-right" x-text="formatNumber(row.quantityLiters)"></td>
                            <td class="px-3 py-2 text-right" x-text="formatNumber(row.minReserveLiters)"></td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>

                  <div class="mt-4 flex justify-end">
                    <button type="button" @click="closeForm()" class="h-11 rounded-lg border border-gray-200 px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]">Fechar</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
