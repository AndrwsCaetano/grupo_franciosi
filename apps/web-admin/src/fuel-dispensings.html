<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Apontamentos | Grupo Franciosi</title>
  </head>
  <body
    x-data="{ page: 'fuel-dispensings', pageName: 'Apontamentos', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <include src="./partials/preloader.html"></include>

    <div class="flex h-screen overflow-hidden">
      <include src="./partials/sidebar.html"></include>

      <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto">
        <include src="./partials/overlay.html" />
        <include src="./partials/header.html" />

        <main>
          <div class="p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6" x-data="fuelDispensingsPage()" x-init="init()">
            <include src="./partials/breadcrumb.html" />

            <div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]">
              <div class="flex flex-col gap-3 mb-4 md:flex-row md:items-center md:justify-between">
                <div class="flex flex-wrap items-center gap-2">
                  <select x-model="filters.pointId" @change="load()" class="dark:bg-dark-900 h-11 rounded-lg border border-gray-300 bg-transparent px-3 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90">
                    <option value="">Todos os pontos</option>
                    <template x-for="p in points" :key="p.id">
                      <option :value="p.id" x-text="p.name"></option>
                    </template>
                  </select>
                  <select x-model="filters.syncStatus" @change="applyFilters()" class="dark:bg-dark-900 h-11 rounded-lg border border-gray-300 bg-transparent px-3 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90">
                    <option value="">Todos os status</option>
                    <option value="PENDENTE">Pendente</option>
                    <option value="SINCRONIZADO">Sincronizado</option>
                    <option value="ERRO">Erro</option>
                  </select>
                  <input
                    type="text"
                    x-model.debounce.300ms="q"
                    @input="applyFilters()"
                    placeholder="Pesquisar por operador, equipamento ou produto…"
                    class="dark:bg-dark-900 h-11 w-full md:w-64 rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90"
                  />
                  <button type="button" @click="load()" class="inline-flex h-11 items-center rounded-lg border border-gray-200 px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]">
                    Atualizar
                  </button>
                </div>
              </div>

              <div x-show="error" x-cloak class="mb-3 rounded-lg border border-error-500/40 bg-error-500/10 px-4 py-3 text-sm text-error-700 dark:text-error-400" x-text="error"></div>

              <div class="overflow-x-auto">
                <table class="min-w-full text-left text-sm">
                  <thead class="border-b border-gray-200 text-xs uppercase text-gray-500 dark:border-gray-800 dark:text-gray-400">
                    <tr>
                      <th class="px-4 py-3">Data/Hora</th>
                      <th class="px-4 py-3">Ponto</th>
                      <th class="px-4 py-3">Maquinário</th>
                      <th class="px-4 py-3">Produto</th>
                      <th class="px-4 py-3 text-right">Quantidade</th>
                      <th class="px-4 py-3">Operador</th>
                      <th class="px-4 py-3">Sincronização</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-gray-100 dark:divide-gray-800">
                    <template x-if="loading">
                      <tr><td colspan="7" class="px-4 py-6 text-center text-gray-500">Carregando…</td></tr>
                    </template>
                    <template x-if="!loading && items.length === 0">
                      <tr><td colspan="7" class="px-4 py-6 text-center text-gray-500">Nenhum apontamento encontrado.</td></tr>
                    </template>
                    <template x-for="d in items" :key="d.id">
                      <tr class="hover:bg-gray-50 dark:hover:bg-white/[0.03]">
                        <td class="px-4 py-3 font-medium text-gray-800 dark:text-white/90" x-text="formatDateTime(d.createdAt)"></td>
                        <td class="px-4 py-3 text-gray-700 dark:text-gray-300" x-text="d.point?.name || '—'"></td>
                        <td class="px-4 py-3 text-gray-700 dark:text-gray-300" x-text="d.machinery?.tag || '—'"></td>
                        <td class="px-4 py-3 text-gray-700 dark:text-gray-300" x-text="d.product?.name || '—'"></td>
                        <td class="px-4 py-3 text-right text-gray-700 dark:text-gray-300" x-text="formatNumber(d.liters)"></td>
                        <td class="px-4 py-3 text-gray-700 dark:text-gray-300" x-text="d.operator?.name || '—'"></td>
                        <td class="px-4 py-3">
                          <span :class="syncBadgeClass(d.syncStatus)" class="inline-flex rounded-full px-2 py-0.5 text-xs" x-text="syncLabel(d.syncStatus)"></span>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>

              <p class="mt-3 text-xs text-gray-500 dark:text-gray-400">Total: <span x-text="total"></span></p>
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
