<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Abastecimento de Veículo | Grupo Franciosi</title>
  </head>
  <body
    x-data="{ page: 'fuelings', pageName: 'Abastecimento de Veículo', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <include src="./partials/preloader.html"></include>

    <div class="flex h-screen overflow-hidden">
      <include src="./partials/sidebar.html"></include>

      <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto">
        <include src="./partials/overlay.html" />
        <include src="./partials/header.html" />

        <main>
          <div class="p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6" x-data="fuelingsPage()" x-init="init()">
            <include src="./partials/breadcrumb.html" />

            <div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]">
              <div class="flex flex-col gap-3 mb-4 md:flex-row md:items-center md:justify-between">
                <div class="flex items-center gap-2">
                  <input
                    type="text"
                    x-model.debounce.300ms="q"
                    @input="load()"
                    placeholder="Pesquisar por motorista ou placa…"
                    class="dark:bg-dark-900 h-11 w-full md:w-80 rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90"
                  />
                  <button type="button" @click="load()" class="inline-flex h-11 items-center rounded-lg border border-gray-200 px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]">
                    Atualizar
                  </button>
                </div>
                <button type="button" x-show="canWrite" @click="openNew()" class="inline-flex h-11 items-center justify-center rounded-lg bg-brand-500 px-5 text-sm font-medium text-white shadow-theme-xs hover:bg-brand-600">
                  + Novo abastecimento
                </button>
              </div>

              <div x-show="error" x-cloak class="mb-3 rounded-lg border border-error-500/40 bg-error-500/10 px-4 py-3 text-sm text-error-700 dark:text-error-400" x-text="error"></div>

              <div class="overflow-x-auto">
                <table class="min-w-full text-left text-sm">
                  <thead class="border-b border-gray-200 text-xs uppercase text-gray-500 dark:border-gray-800 dark:text-gray-400">
                    <tr>
                      <th class="cursor-pointer px-4 py-3" @click="sortBy('fuelDate')">Data abast. <span x-text="sortIndicator('fuelDate')"></span></th>
                      <th class="cursor-pointer px-4 py-3" @click="sortBy('vehicle')">Placa <span x-text="sortIndicator('vehicle')"></span></th>
                      <th class="cursor-pointer px-4 py-3" @click="sortBy('driver')">Motorista <span x-text="sortIndicator('driver')"></span></th>
                      <th class="cursor-pointer px-4 py-3 text-right" @click="sortBy('quantityLiters')">Qtde (L) <span x-text="sortIndicator('quantityLiters')"></span></th>
                      <th class="cursor-pointer px-4 py-3 text-right" @click="sortBy('odometerKm')">Km <span x-text="sortIndicator('odometerKm')"></span></th>
                      <th class="px-4 py-3">Compr.</th>
                      <th class="cursor-pointer px-4 py-3" @click="sortBy('createdAt')">Lançado em <span x-text="sortIndicator('createdAt')"></span></th>
                      <th class="px-4 py-3">Lançador</th>
                      <th class="px-4 py-3 text-right">Ações</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-gray-100 dark:divide-gray-800">
                    <template x-if="loading">
                      <tr><td colspan="9" class="px-4 py-6 text-center text-gray-500">Carregando…</td></tr>
                    </template>
                    <template x-if="!loading && items.length === 0">
                      <tr><td colspan="9" class="px-4 py-6 text-center text-gray-500">Nenhum abastecimento encontrado.</td></tr>
                    </template>
                    <template x-for="f in items" :key="f.id">
                      <tr class="hover:bg-gray-50 dark:hover:bg-white/[0.03]">
                        <td class="px-4 py-3 font-medium text-gray-800 dark:text-white/90" x-text="formatDate(f.fuelDate)"></td>
                        <td class="px-4 py-3 text-gray-700 dark:text-gray-300" x-text="f.vehicle?.plate || '—'"></td>
                        <td class="px-4 py-3 text-gray-700 dark:text-gray-300" x-text="f.driverNameSnapshot"></td>
                        <td class="px-4 py-3 text-right text-gray-700 dark:text-gray-300" x-text="formatLiters(f.quantityLiters)"></td>
                        <td class="px-4 py-3 text-right text-gray-700 dark:text-gray-300" x-text="formatKm(f.odometerKm)"></td>
                        <td class="px-4 py-3">
                          <template x-if="f.receiptImagePath">
                            <button
                              type="button"
                              @click="openReceipt(f)"
                              class="rounded-md border border-gray-200 px-2 py-1 text-xs font-medium text-brand-600 hover:bg-brand-50 dark:border-gray-700 dark:hover:bg-white/[0.05]"
                            >
                              Ver
                            </button>
                          </template>
                          <template x-if="!f.receiptImagePath">
                            <span class="text-xs text-gray-400">—</span>
                          </template>
                        </td>
                        <td class="px-4 py-3 text-gray-500 text-xs" x-text="formatDateTime(f.createdAt)"></td>
                        <td class="px-4 py-3 text-gray-500 text-xs" x-text="f.createdBy?.name || '—'"></td>
                        <td class="px-4 py-3 text-right whitespace-nowrap">
                          <button type="button" x-show="canWrite" @click="openEdit(f)" class="mr-2 rounded-md border border-gray-200 px-3 py-1.5 text-xs font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]">Editar</button>
                          <button type="button" x-show="canWrite" @click="askDelete(f)" class="rounded-md border border-error-500/40 px-3 py-1.5 text-xs font-medium text-error-600 hover:bg-error-500/10">Excluir</button>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>

              <p class="mt-3 text-xs text-gray-500 dark:text-gray-400">Total: <span x-text="total"></span></p>
            </div>

            <!-- Modal abastecimento -->
            <div x-show="showForm" x-cloak class="fixed inset-0 z-99999 flex items-center justify-center bg-gray-900/50 p-4" @keydown.escape.window="closeForm()">
              <div class="w-full max-w-2xl rounded-2xl bg-white p-6 dark:bg-gray-900 max-h-[92vh] overflow-y-auto" @click.outside="closeForm()">
                <div class="mb-4 flex items-center justify-between">
                  <h3 class="text-lg font-semibold text-gray-800 dark:text-white/90" x-text="form.id ? 'Editar abastecimento' : 'Novo abastecimento'"></h3>
                  <button type="button" @click="closeForm()" class="text-gray-500 hover:text-gray-700">×</button>
                </div>

                <form @submit.prevent="save()" class="space-y-4">
                  <div x-show="formError" x-cloak class="rounded-lg border border-error-500/40 bg-error-500/10 px-4 py-2 text-sm text-error-700 dark:text-error-400" x-text="formError"></div>

                  <!-- Auditoria (somente quando editando) -->
                  <div x-show="form.id" x-cloak class="grid grid-cols-1 gap-3 rounded-lg border border-gray-200 bg-gray-50 p-3 sm:grid-cols-2 dark:border-gray-700 dark:bg-white/[0.03]">
                    <div>
                      <p class="text-xs uppercase text-gray-500">Lançado em</p>
                      <p class="text-sm text-gray-800 dark:text-white/90" x-text="formatDateTime(form.createdAt)"></p>
                    </div>
                    <div>
                      <p class="text-xs uppercase text-gray-500">Lançador</p>
                      <p class="text-sm text-gray-800 dark:text-white/90" x-text="form.createdBy"></p>
                    </div>
                  </div>

                  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
                    <div class="sm:col-span-2">
                      <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">Motorista *</label>
                      <select x-model="form.driverId" @change="onDriverChange()" required class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-3 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90">
                        <option value="">— selecionar —</option>
                        <template x-for="d in drivers" :key="d.id">
                          <option :value="d.id" x-text="d.name"></option>
                        </template>
                      </select>
                    </div>
                    <div>
                      <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">Veículo (placa) *</label>
                      <select x-model="form.vehicleId" required class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-3 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90">
                        <option value="">— selecionar —</option>
                        <template x-for="v in vehicles" :key="v.id">
                          <option :value="v.id" x-text="v.plate + ' — ' + v.brand + ' ' + v.model"></option>
                        </template>
                      </select>
                    </div>
                    <div>
                      <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">Data do abastecimento *</label>
                      <input type="date" x-model="form.fuelDate" required class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90" />
                    </div>
                    <div>
                      <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">Quantidade (L) *</label>
                      <input type="number" min="0.01" max="99999.99" step="0.01" x-model.number="form.quantityLiters" required class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90" />
                    </div>
                    <div>
                      <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">Quilometragem (km)</label>
                      <input type="number" min="0" max="99999999" step="1" x-model.number="form.odometerKm" placeholder="Hodômetro do veículo" class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90" />
                    </div>
                    <div class="sm:col-span-2">
                      <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">Observações</label>
                      <textarea x-model="form.notes" rows="2" class="dark:bg-dark-900 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90"></textarea>
                    </div>

                    <!-- Upload comprovante -->
                    <div class="sm:col-span-2">
                      <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">Comprovante (imagem)</label>
                      <div class="flex flex-col gap-3 sm:flex-row sm:items-start">
                        <div class="flex-1">
                          <input type="file" accept="image/*" @change="onReceiptSelected($event)" class="block w-full text-sm text-gray-700 file:mr-3 file:rounded-md file:border-0 file:bg-brand-500 file:px-3 file:py-2 file:text-sm file:font-medium file:text-white hover:file:bg-brand-600" />
                          <p class="mt-1 text-xs text-gray-500">JPG, PNG, WEBP ou HEIC — até 8 MB.</p>
                          <button type="button" x-show="receiptPreview" @click="clearReceipt()" class="mt-2 rounded-md border border-gray-200 px-3 py-1 text-xs text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]">Remover imagem</button>
                        </div>
                        <div class="w-full sm:w-48">
                          <template x-if="receiptPreview">
                            <img :src="receiptPreview" alt="Pré-visualização do comprovante" class="h-40 w-full rounded-lg border border-gray-200 object-cover dark:border-gray-700" />
                          </template>
                          <template x-if="!receiptPreview">
                            <div class="flex h-40 w-full items-center justify-center rounded-lg border border-dashed border-gray-300 text-xs text-gray-400 dark:border-gray-700">Sem imagem</div>
                          </template>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div class="flex justify-end gap-2 pt-2">
                    <button type="button" @click="closeForm()" class="h-11 rounded-lg border border-gray-200 px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]">Cancelar</button>
                    <button type="submit" :disabled="saving" class="h-11 rounded-lg bg-brand-500 px-5 text-sm font-medium text-white hover:bg-brand-600 disabled:opacity-70">
                      <span x-show="!saving">Guardar</span>
                      <span x-show="saving" x-cloak>A guardar…</span>
                    </button>
                  </div>
                </form>
              </div>
            </div>

            <!-- Modal: visualização do comprovante (lightbox) -->
            <div
              x-show="receiptModalUrl"
              x-cloak
              class="fixed inset-0 z-99999 flex items-center justify-center bg-gray-900/70 p-4"
              @click.self="closeReceipt()"
              @keydown.escape.window="closeReceipt()"
            >
              <div class="flex w-full max-w-5xl flex-col rounded-2xl bg-white p-4 shadow-2xl dark:bg-gray-900">
                <div class="mb-3 flex items-center justify-between gap-3">
                  <h3 class="truncate text-sm font-semibold text-gray-800 dark:text-white/90" x-text="receiptModalLabel || 'Comprovante'"></h3>
                  <button
                    type="button"
                    @click="closeReceipt()"
                    class="rounded-md p-1 text-gray-500 hover:bg-gray-100 hover:text-gray-700 dark:hover:bg-white/[0.05]"
                    aria-label="Fechar"
                  >
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path d="M5 5L15 15M15 5L5 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                    </svg>
                  </button>
                </div>
                <div class="flex flex-1 items-center justify-center overflow-auto rounded-lg bg-gray-50 p-2 dark:bg-white/[0.03]">
                  <img
                    :src="receiptModalUrl"
                    :alt="receiptModalLabel || 'Comprovante'"
                    class="max-h-[75vh] max-w-full object-contain"
                  />
                </div>
                <div class="mt-3 flex flex-wrap items-center justify-end gap-2">
                  <a
                    :href="receiptModalUrl"
                    target="_blank"
                    rel="noopener"
                    class="inline-flex h-10 items-center rounded-lg border border-gray-200 px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]"
                  >
                    Abrir em nova aba
                  </a>
                  <button
                    type="button"
                    @click="downloadReceipt()"
                    class="inline-flex h-10 items-center rounded-lg border border-gray-200 px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]"
                  >
                    Baixar
                  </button>
                  <button
                    type="button"
                    @click="closeReceipt()"
                    class="inline-flex h-10 items-center rounded-lg bg-brand-500 px-5 text-sm font-medium text-white hover:bg-brand-600"
                  >
                    Fechar
                  </button>
                </div>
              </div>
            </div>

            <!-- Modal: confirmar exclusão -->
            <div x-show="confirmId" x-cloak class="fixed inset-0 z-99999 flex items-center justify-center bg-gray-900/50 p-4">
              <div class="w-full max-w-md rounded-2xl bg-white p-6 dark:bg-gray-900">
                <h3 class="mb-2 text-lg font-semibold text-gray-800 dark:text-white/90">Confirmar exclusão</h3>
                <p class="mb-4 text-sm text-gray-600 dark:text-gray-400">
                  Excluir abastecimento <strong x-text="confirmLabel"></strong>?
                </p>
                <div class="flex justify-end gap-2">
                  <button type="button" @click="cancelDelete()" class="h-10 rounded-lg border border-gray-200 px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]">Cancelar</button>
                  <button type="button" @click="confirmDelete()" class="h-10 rounded-lg bg-error-500 px-5 text-sm font-medium text-white hover:bg-error-600">Excluir</button>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
