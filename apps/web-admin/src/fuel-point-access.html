<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Liberação Usuários × Pontos | Grupo Franciosi</title>
  </head>
  <body
    x-data="{ page: 'fuel-point-access', pageName: 'Liberação Usuários × Pontos', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <include src="./partials/preloader.html"></include>

    <div class="flex h-screen overflow-hidden">
      <include src="./partials/sidebar.html"></include>

      <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto">
        <include src="./partials/overlay.html" />
        <include src="./partials/header.html" />

        <main>
          <div class="p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6" x-data="fuelPointAccessPage()" x-init="init()">
            <include src="./partials/breadcrumb.html" />

            <div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]">
              <div class="flex flex-col gap-3 mb-4 md:flex-row md:items-center md:justify-between">
                <div class="flex flex-wrap items-center gap-2">
                  <select x-model="filters.pointId" @change="load()" class="dark:bg-dark-900 h-11 rounded-lg border border-gray-300 bg-transparent px-3 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90">
                    <option value="">Todos os pontos</option>
                    <template x-for="p in points" :key="p.id">
                      <option :value="p.id" x-text="p.name"></option>
                    </template>
                  </select>
                  <button type="button" @click="load()" class="inline-flex h-11 items-center rounded-lg border border-gray-200 px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]">
                    Atualizar
                  </button>
                </div>
                <button type="button" x-show="canWrite" @click="openNew()" class="inline-flex h-11 items-center justify-center rounded-lg bg-brand-500 px-5 text-sm font-medium text-white shadow-theme-xs hover:bg-brand-600">
                  + Liberar acesso
                </button>
              </div>

              <div x-show="error" x-cloak class="mb-3 rounded-lg border border-error-500/40 bg-error-500/10 px-4 py-3 text-sm text-error-700 dark:text-error-400" x-text="error"></div>

              <div class="overflow-x-auto">
                <table class="min-w-full text-left text-sm">
                  <thead class="border-b border-gray-200 text-xs uppercase text-gray-500 dark:border-gray-800 dark:text-gray-400">
                    <tr>
                      <th class="px-4 py-3">Usuário</th>
                      <th class="px-4 py-3">Ponto</th>
                      <th class="px-4 py-3">Liberado em</th>
                      <th class="px-4 py-3 text-right">Ações</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-gray-100 dark:divide-gray-800">
                    <template x-if="loading">
                      <tr><td colspan="4" class="px-4 py-6 text-center text-gray-500">Carregando…</td></tr>
                    </template>
                    <template x-if="!loading && items.length === 0">
                      <tr><td colspan="4" class="px-4 py-6 text-center text-gray-500">Nenhuma liberação encontrada.</td></tr>
                    </template>
                    <template x-for="a in items" :key="a.userId + ':' + a.pointId">
                      <tr class="hover:bg-gray-50 dark:hover:bg-white/[0.03]">
                        <td class="px-4 py-3 font-medium text-gray-800 dark:text-white/90" x-text="a.user?.name || '—'"></td>
                        <td class="px-4 py-3 text-gray-700 dark:text-gray-300" x-text="a.point?.name || '—'"></td>
                        <td class="px-4 py-3 text-gray-500 text-xs" x-text="formatDateTime(a.assignedAt)"></td>
                        <td class="px-4 py-3 text-right">
                          <button type="button" x-show="canWrite" @click="askRemove(a)" class="rounded-md border border-error-500/40 px-3 py-1.5 text-xs font-medium text-error-600 hover:bg-error-500/10">Remover</button>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>

              <p class="mt-3 text-xs text-gray-500 dark:text-gray-400">Total: <span x-text="total"></span></p>
            </div>

            <!-- Modal: nova liberação -->
            <div x-show="showForm" x-cloak class="fixed inset-0 z-99999 flex items-center justify-center bg-gray-900/50 p-4" @keydown.escape.window="closeForm()">
              <div class="w-full max-w-md rounded-2xl bg-white p-6 dark:bg-gray-900" @click.outside="closeForm()">
                <div class="mb-4 flex items-center justify-between">
                  <h3 class="text-lg font-semibold text-gray-800 dark:text-white/90">Liberar acesso a ponto</h3>
                  <button type="button" @click="closeForm()" class="text-gray-500 hover:text-gray-700">×</button>
                </div>
                <form @submit.prevent="save()" class="space-y-4">
                  <div x-show="formError" x-cloak class="rounded-lg border border-error-500/40 bg-error-500/10 px-4 py-2 text-sm text-error-700 dark:text-error-400" x-text="formError"></div>
                  <div>
                    <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">Usuário *</label>
                    <select x-model="form.userId" required class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-3 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90">
                      <option value="">— selecionar —</option>
                      <template x-for="u in users" :key="u.id">
                        <option :value="u.id" x-text="u.name + ' (' + u.email + ')'"></option>
                      </template>
                    </select>
                  </div>
                  <div>
                    <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">Ponto de abastecimento *</label>
                    <select x-model="form.pointId" required class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-3 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90">
                      <option value="">— selecionar —</option>
                      <template x-for="p in points" :key="p.id">
                        <option :value="p.id" x-text="p.name"></option>
                      </template>
                    </select>
                  </div>
                  <div class="flex justify-end gap-2 pt-2">
                    <button type="button" @click="closeForm()" class="h-11 rounded-lg border border-gray-200 px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]">Cancelar</button>
                    <button type="submit" :disabled="saving" class="h-11 rounded-lg bg-brand-500 px-5 text-sm font-medium text-white hover:bg-brand-600 disabled:opacity-70">
                      <span x-show="!saving">Liberar</span>
                      <span x-show="saving" x-cloak>A liberar…</span>
                    </button>
                  </div>
                </form>
              </div>
            </div>

            <!-- Modal: confirmar remoção -->
            <div x-show="confirmUserId" x-cloak class="fixed inset-0 z-99999 flex items-center justify-center bg-gray-900/50 p-4">
              <div class="w-full max-w-md rounded-2xl bg-white p-6 dark:bg-gray-900">
                <h3 class="mb-2 text-lg font-semibold text-gray-800 dark:text-white/90">Confirmar remoção</h3>
                <p class="mb-4 text-sm text-gray-600 dark:text-gray-400">
                  Remover acesso de <strong x-text="confirmLabel"></strong>?
                </p>
                <div class="flex justify-end gap-2">
                  <button type="button" @click="cancelRemove()" class="h-10 rounded-lg border border-gray-200 px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-white/80 dark:hover:bg-white/[0.05]">Cancelar</button>
                  <button type="button" @click="confirmRemove()" class="h-10 rounded-lg bg-error-500 px-5 text-sm font-medium text-white hover:bg-error-600">Remover</button>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
