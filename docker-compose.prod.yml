# Stack de produção do monorepo Grupo Franciosi.
# Integrado com Traefik externo (rede `traefik` compartilhada).
#
# Deploy:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Serviços:
#   postgres — banco interno da aplicação (não exposto fora da rede interna).
#   api      — NestJS + Prisma + Oracle Instant Client embutido (Thick mode).
#   web      — nginx: painel web-admin + proxy da API. Roteado pelo Traefik.
#   pwa      — nginx: PWA motorista + proxy /driver-auth, /driver, /uploads. Roteado pelo Traefik.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-grupo_franciosi}
    volumes:
      - grupo_franciosi_pg:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-grupo_franciosi}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/grupo_franciosi?schema=public}
      JWT_SECRET: ${JWT_SECRET:?defina JWT_SECRET no .env.production}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_DAYS: ${JWT_REFRESH_EXPIRES_DAYS:-60}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://grupofranciosi.agrigestao.tech,https://pwa.grupofranciosi.agrigestao.tech}
      ORACLE_CLIENT_LIB_DIR: /opt/oracle/instantclient
      RUN_SEED: ${RUN_SEED:-1}
    volumes:
      - grupo_franciosi_uploads:/app/apps/api/uploads
    networks:
      - internal
    expose:
      - "4000"

  web:
    build:
      context: .
      dockerfile: apps/web-admin/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - internal
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.franciosi-web.rule=Host(`grupofranciosi.agrigestao.tech`)"
      - "traefik.http.routers.franciosi-web.entrypoints=websecure"
      - "traefik.http.routers.franciosi-web.tls=true"
      - "traefik.http.routers.franciosi-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.franciosi-web.loadbalancer.server.port=80"

  pwa:
    build:
      context: .
      dockerfile: apps/pwa/Dockerfile
      args:
        VITE_API_URL: ${VITE_PWA_API_URL:-}
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - internal
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.franciosi-pwa.rule=Host(`pwa.grupofranciosi.agrigestao.tech`)"
      - "traefik.http.routers.franciosi-pwa.entrypoints=websecure"
      - "traefik.http.routers.franciosi-pwa.tls=true"
      - "traefik.http.routers.franciosi-pwa.tls.certresolver=letsencrypt"
      - "traefik.http.services.franciosi-pwa.loadbalancer.server.port=80"

volumes:
  grupo_franciosi_pg:
  grupo_franciosi_uploads:

networks:
  internal:
    driver: bridge
  traefik:
    external: true
    name: traefik
